<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="robots" content="noindex, nofollow">
<title>Vermogen — kijkversie</title>
<style>
  :root { --bg:#f6f4ef; --surface:#fffdf9; --border:#e3ded4; --text:#1c2430; --muted:#5a6472;
    --muted2:#8b93a3; --accent:#2456c8; --accent-rgb:36,86,200; --green:#1c7a4d; --red:#b23a3a;
    --red-rgb:178,58,58; --amber:#9a6d1b; }
  @media (prefers-color-scheme: dark) {
    :root { --bg:#0c0e13; --surface:#161a22; --border:#2a313f; --text:#e8ebf2; --muted:#a7aec0;
      --muted2:#5d6b7e; --accent:#6f9bff; --accent-rgb:111,155,255; --green:#4dcb7d; --red:#e06c6c;
      --red-rgb:224,108,108; --amber:#d9a441; } }
  * { box-sizing: border-box; }
  body { margin:0; font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
    background: var(--bg); color: var(--text); font-size: 14px; line-height: 1.45; }
  .wrap { max-width: 560px; margin: 0 auto; padding: 14px 12px 40px; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px;
    padding: 14px; margin-bottom: 12px; }
  h1 { font-size: 17px; margin: 6px 0 14px; }
  h1 small { color: var(--muted2); font-weight: 400; font-size: 12px; display:block; }
  .label { font-size: 10.5px; letter-spacing: .5px; text-transform: uppercase; color: var(--muted2); }
  .total { font-size: 30px; font-weight: 800; margin: 2px 0; }
  .delta { font-size: 13.5px; }
  .pos { color: var(--green); } .neg { color: var(--red); }
  .muted { color: var(--muted); } .klein { font-size: 12px; }
  .rij { display: flex; justify-content: space-between; align-items: baseline; gap: 10px;
    padding: 8px 0; border-top: 1px solid var(--border); }
  .rij:first-of-type { border-top: 0; }
  .rij b { font-weight: 650; }
  .scan { display: flex; align-items: center; gap: 14px; }
  .cijfer { font-size: 40px; font-weight: 800; min-width: 50px; text-align: center; }
  .pill { display: inline-block; border: 1px solid var(--border); border-radius: 999px;
    padding: 2px 9px; font-size: 12px; margin-right: 5px; color: var(--muted); }
  svg { width: 100%; height: auto; display: block; }
  .tabs { display: flex; gap: 6px; margin: 4px 0 8px; }
  .tabs button { font: inherit; font-size: 12.5px; border: 1px solid var(--border);
    background: transparent; color: var(--muted); border-radius: 999px; padding: 4px 12px; }
  .tabs button.aan { background: var(--accent); border-color: var(--accent); color: #fff; }
  /* wachtwoordscherm */
  #slot { min-height: 88vh; display: grid; place-items: center; }
  #slot .card { width: min(340px, 92vw); text-align: center; }
  #slot input[type=password] { width: 100%; font: inherit; font-size: 16px; padding: 10px 12px;
    border: 1px solid var(--border); border-radius: 9px; background: var(--bg); color: var(--text);
    margin: 10px 0 4px; }
  #slot button.hoofd { width: 100%; font: inherit; font-weight: 650; padding: 11px; margin-top: 8px;
    background: var(--accent); color: #fff; border: 0; border-radius: 9px; }
  #slot label.onthoud { display: flex; gap: 7px; justify-content: center; align-items: center;
    font-size: 12.5px; color: var(--muted); margin-top: 10px; }
  .fout { color: var(--red); font-size: 12.5px; min-height: 17px; margin-top: 6px; }
  .voet { color: var(--muted2); font-size: 11.5px; text-align: center; margin-top: 18px; }
</style>
</head>
<body>
<div id="slot">
  <div class="card">
    <div style="font-size:26px">🔒</div>
    <h1 style="margin:8px 0 2px">Vermogen — kijkversie</h1>
    <div class="muted klein">Alleen-lezen momentopname, versleuteld opgeslagen.</div>
    <input id="ww" type="password" placeholder="Wachtwoord" autocomplete="current-password">
    <button class="hoofd" id="open">Ontgrendelen</button>
    <label class="onthoud"><input type="checkbox" id="onthoud"> Onthoud op dit apparaat</label>
    <div class="fout" id="fout"></div>
  </div>
</div>
<div class="wrap" id="app" hidden></div>

async function sleutelVanWachtwoord(ww) {
  const basis = await crypto.subtle.importKey('raw', new TextEncoder().encode(ww),
    'PBKDF2', false, ['deriveKey']);
  return crypto.subtle.deriveKey(
    { name: 'PBKDF2', salt: b64(PAKKET.salt), iterations: PAKKET.iterations, hash: 'SHA-256' },
    basis, { name: 'AES-GCM', length: 256 }, true, ['decrypt']);
}
async function ontsleutel(sleutel) {

    sleutel, b64(PAKKET.ciphertext));
  return JSON.parse(new TextDecoder().decode(klaar));
}

  const marge = (max - min) * .08 || 1; min -= marge; max += marge;
  if (modus !== 'groei') min = Math.max(0, min);
  const X = i => padL + i / (punten.length - 1) * (W - padL - padR);
  const Y = v => H - padB - (v - min) / (max - min) * (H - padT - padB);
  const lijn = punten.map((p, i) => `${i ? 'L' : 'M'}${X(i).toFixed(1)} ${Y(p.v).toFixed(1)}`).join(' ');
  const nul = modus === 'groei' && min < 0 && max > 0;
  const y0 = nul ? Y(0) : H - padB;
  const vlak = `${lijn} L${X(punten.length - 1).toFixed(1)} ${y0.toFixed(1)} L${X(0).toFixed(1)} ${y0.toFixed(1)} Z`;
  const laatste = punten[punten.length - 1];
  const clip = nul ? `<clipPath id="cb"><rect x="0" y="0" width="${W}" height="${y0}"/></clipPath>
    <clipPath id="co"><rect x="0" y="${y0}" width="${W}" height="${H - y0}"/></clipPath>` : '';
  const paden = nul
    ? `<path d="${vlak}" fill="rgba(var(--accent-rgb),.13)" clip-path="url(#cb)"/>
       <path d="${vlak}" fill="rgba(var(--red-rgb),.15)" clip-path="url(#co)"/>
       <path d="${lijn}" fill="none" stroke="var(--accent)" stroke-width="2.2" clip-path="url(#cb)"/>
       <path d="${lijn}" fill="none" stroke="var(--red)" stroke-width="2.2" clip-path="url(#co)"/>
       <line x1="${padL}" x2="${W - padR}" y1="${y0.toFixed(1)}" y2="${y0.toFixed(1)}"
         stroke="var(--muted2)" stroke-width="1" stroke-dasharray="2 3"/>`
    : `<path d="${vlak}" fill="rgba(var(--accent-rgb),.13)"/>
       <path d="${lijn}" fill="none" stroke="var(--accent)" stroke-width="2.2"/>`;
  return `<svg viewBox="0 0 ${W} ${H}">${clip}${paden}
    <circle cx="${X(punten.length - 1).toFixed(1)}" cy="${Y(laatste.v).toFixed(1)}" r="3.6"
      fill="var(${laatste.v < 0 && nul ? '--red' : '--accent'})"/>
    <text x="${padL}" y="${H - 1}" fill="var(--muted2)" font-size="10">${punten[0].d}</text>
    <text x="${W - padR}" y="${H - 1}" fill="var(--muted2)" font-size="10" text-anchor="end">${laatste.d}</text>
  </svg>`;
}

let DATA = null, MODUS = 'waarde';
function render() {
  const d = DATA;
  const el = document.getElementById('app');
  const s = d.serie || { dates: [], waarde: [], groei: [] };
  const laatsteGroei = [...(s.groei || [])].reverse().find(v => v != null);
  const rekeningen = (d.rekeningen || []).map(r => `<div class="rij">
      <span>${esc(r.naam)}<span class="muted klein"> · ${esc(r.soort)}</span></span>
      <b>${r.waarde == null ? '<span class="muted">nog geen saldo</span>' : eur(r.waarde)}</b></div>`).join('');
  const posities = (d.posities || []).map(p => `<div class="rij">
      <span>${esc(p.naam)}<span class="muted klein"> · ${p.aantal} st</span></span>
      <span style="text-align:right"><b>${eur(p.waarde)}</b><br>
        <span class="klein ${cls(p.wv)}">${p.wv >= 0 ? '+' : ''}${eur(p.wv)} ${pct(p.wv_pct)}</span></span></div>`).join('');
  const scan = d.scan && d.scan.beschikbaar !== false ? `<div class="card"><div class="label">Portfolio-scan</div>
      <div class="scan"><div class="cijfer">${d.scan.eindcijfer}</div>
        <div><span class="pill">Spreiding ${d.scan.spreiding}</span><span class="pill">Risico ${d.scan.risico}</span>
          <span class="pill">Kosten ${d.scan.kosten}</span>
          <div class="muted klein" style="margin-top:6px">${esc(d.scan.samenvatting || '')}</div></div></div></div>` : '';
  el.innerHTML = `
    <h1>Vermogensoverzicht <small>kijkversie · alleen-lezen · gegevens van ${esc(d.peildatum || '?')}</small></h1>
    <div class="card">
      <div class="label">Totaal vermogen</div>
      <div class="total">${eur(d.totaal)}</div>
      ${laatsteGroei != null ? `<div class="delta ${cls(laatsteGroei)}">${laatsteGroei >= 0 ? '+' : ''}${eur(laatsteGroei)} groei t.o.v. je inleg</div>` : ''}
      <div class="tabs" style="margin-top:10px">
        <button id="tWaarde" class="${MODUS === 'waarde' ? 'aan' : ''}">€ Waarde</button>
        <button id="tGroei" class="${MODUS === 'groei' ? 'aan' : ''}">📈 Groei</button>
      </div>
      <div id="grafiek">${grafiek(s, MODUS)}</div>
    </div>
    ${scan}
    <div class="card"><div class="label">Rekeningen</div>${rekeningen || '<div class="muted klein">—</div>'}</div>
    <div class="card"><div class="label">Posities (DEGIRO)</div>${posities || '<div class="muted klein">—</div>'}</div>
    <div class="voet">Versleutelde momentopname · bijwerken kan alleen in de app thuis ·
      gemaakt ${esc((PAKKET.gemaakt_op || '').slice(0, 16).replace('T', ' '))} UTC</div>`;
  document.getElementById('tWaarde').onclick = () => { MODUS = 'waarde'; render(); };
  document.getElementById('tGroei').onclick = () => { MODUS = 'groei'; render(); };
}

async function ontgrendel(sleutel, onthoud) {
  DATA = await ontsleutel(sleutel);            // gooit bij fout wachtwoord (GCM-check)
  if (onthoud) {
    const raw = await crypto.subtle.exportKey('jwk', sleutel);
    localStorage.setItem('kijksleutel', JSON.stringify(raw));
  }
  document.getElementById('slot').remove();
  const app = document.getElementById('app');
  app.hidden = false;
  render();
}

document.getElementById('open').addEventListener('click', async () => {
  const fout = document.getElementById('fout');
  fout.textContent = '';
  try {
    const sleutel = await sleutelVanWachtwoord(document.getElementById('ww').value || '');
    await ontgrendel(sleutel, document.getElementById('onthoud').checked);
  } catch (_) {
    fout.textContent = 'Wachtwoord klopt niet (of het bestand is beschadigd).';
  }
});
document.getElementById('ww').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('open').click();
});
// eerder onthouden sleutel? probeer stil te ontgrendelen (mislukt = gewoon inloggen)
(async () => {
  try {
    const bewaard = localStorage.getItem('kijksleutel');
    if (!bewaard) return;
    const sleutel = await crypto.subtle.importKey('jwk', JSON.parse(bewaard),
      { name: 'AES-GCM' }, true, ['decrypt']);
    await ontgrendel(sleutel, false);
  } catch (_) { try { localStorage.removeItem('kijksleutel'); } catch (_) {} }
})();
</script>
