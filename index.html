<!doctype html>
<html lang="nl" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="robots" content="noindex, nofollow">
<meta name="color-scheme" content="light dark">
<title>Vermogensoverzicht</title>
<style>
  :root { --kv-bg:#f6f4ef; --kv-surface:#fffdf9; --kv-border:#e3ded4; --kv-text:#1c2430;
    --kv-muted:#5a6472; --kv-accent:#2456c8; --kv-red:#b23a3a; }
  @media (prefers-color-scheme: dark) {
    :root { --kv-bg:#0c0e13; --kv-surface:#161a22; --kv-border:#2a313f; --kv-text:#e8ebf2;
      --kv-muted:#a7aec0; --kv-accent:#6f9bff; --kv-red:#e06c6c; } }
  #slot { position: fixed; inset: 0; z-index: 9999; display: grid; place-items: center;
    background: var(--kv-bg); color: var(--kv-text);
    font-family: system-ui, -apple-system, "Segoe UI", sans-serif; }
  #slot .kaart { background: var(--kv-surface); border: 1px solid var(--kv-border);
    border-radius: 16px; padding: 30px 26px; width: min(340px, 92vw); text-align: center;
    box-shadow: 0 14px 44px rgba(0,0,0,.14); }
  #slot h1 { font-size: 19px; margin: 8px 0 2px; }
  #slot .sub { color: var(--kv-muted); font-size: 12.5px; }
  #slot input[type=password] { width: 100%; box-sizing: border-box; font: inherit;
    font-size: 16px; padding: 10px 12px; border: 1px solid var(--kv-border);
    border-radius: 9px; background: var(--kv-bg); color: var(--kv-text); margin: 14px 0 2px; }
  #slot button.hoofd { width: 100%; font: inherit; font-weight: 650; font-size: 14.5px;
    padding: 11px; margin-top: 8px; background: var(--kv-accent); color: #fff; border: 0;
    border-radius: 9px; cursor: pointer; }
  #slot label.onthoud { display: flex; gap: 7px; justify-content: center; align-items: center;
    font-size: 12.5px; color: var(--kv-muted); margin-top: 12px; }
  #slot .fout { color: var(--kv-red); font-size: 12.5px; min-height: 17px; margin-top: 8px; }
  #kijkBanner { position: sticky; top: 0; z-index: 500; text-align: center;
    font: 600 11.5px system-ui, sans-serif; letter-spacing: .3px; padding: 5px 8px;
    background: var(--kv-accent); color: #fff; }
</style>
</head>
<body>
<div id="slot">
  <div class="kaart">
    <div style="font-size:26px">🔒</div>
    <h1>Vermogensoverzicht</h1>
    <div class="sub">Je volledige dashboard, alleen-lezen.<br>Versleuteld opgeslagen — vul je wachtwoord in.</div>
    <input id="ww" type="password" placeholder="Wachtwoord" autocomplete="current-password" autofocus>
    <button class="hoofd" id="open">Ontgrendelen</button>
    <label class="onthoud"><input type="checkbox" id="onthoud"> Onthoud op dit apparaat</label>
    <div class="fout" id="fout"></div>
  </div>
</div>

const b64 = s => Uint8Array.from(atob(s), c => c.charCodeAt(0));

async function sleutelVanWachtwoord(ww) {
  const basis = await crypto.subtle.importKey('raw', new TextEncoder().encode(ww),
    'PBKDF2', false, ['deriveKey']);
  return crypto.subtle.deriveKey(
    { name: 'PBKDF2', salt: b64(PAKKET.salt), iterations: PAKKET.iterations, hash: 'SHA-256' },
    basis, { name: 'AES-GCM', length: 256 }, true, ['decrypt']);
}
async function ontsleutel(sleutel) {
  const klaar = await crypto.subtle.decrypt({ name: 'AES-GCM', iv: b64(PAKKET.iv) },
    sleutel, b64(PAKKET.ciphertext));
  let bytes = new Uint8Array(klaar);
  if (PAKKET.compressie === 'gzip') {
    if (typeof DecompressionStream === 'undefined') {
      throw new Error('browser-te-oud');
    }
    const stroom = new Blob([bytes]).stream().pipeThrough(new DecompressionStream('gzip'));
    bytes = new Uint8Array(await new Response(stroom).arrayBuffer());
  }
  return JSON.parse(new TextDecoder().decode(bytes));
}

function startApp(DATA) {
  // thema zoals de echte app (localStorage-voorkeur van dit apparaat)
  try {
    document.documentElement.dataset.theme =
      localStorage.getItem('dashboardTheme') === 'dark' ? 'dark' : 'light';
  } catch (_) { document.documentElement.dataset.theme = 'light'; }
  document.title = 'Vermogensoverzicht';

  // stijl van de echte app
  const stijl = document.createElement('style');
  stijl.textContent = DATA.css || '';
  document.head.appendChild(stijl);

  // fetch-shim: data komt uit het (ontsleutelde) pakket; alles richting de API
  // krijgt een nette alleen-lezen melding — de app toont die zelf in zijn UI.
  const bestanden = (DATA.files || {});
  const echteFetch = window.fetch.bind(window);
  window.fetch = (input, init) => {
    const url = typeof input === 'string' ? input : ((input && input.url) || '');
    const kaal = url.split('?')[0].replace(/^\.\//, '').replace(/^\//, '');
    if (kaal.startsWith('data/')) {
      const naam = kaal.slice(5);
      if (Object.prototype.hasOwnProperty.call(bestanden, naam)) {
        return Promise.resolve(new Response(JSON.stringify(bestanden[naam]),
          { status: 200, headers: { 'Content-Type': 'application/json' } }));
      }
      return Promise.resolve(new Response('{"error":"niet beschikbaar in deze versie"}', { status: 404 }));
    }
    if (kaal.startsWith('api/')) {
      return Promise.resolve(new Response(JSON.stringify({ ok: false,
        error: 'Alleen-lezen — wijzigen doe je thuis in de app.' }),
        { status: 403, headers: { 'Content-Type': 'application/json' } }));
    }
    return echteFetch(input, init);
  };

  document.getElementById('slot').remove();
  const banner = document.createElement('div');
  banner.id = 'kijkBanner';
  banner.textContent = `🔒 Alleen-lezen · bijgewerkt ${DATA.peildatum || '?'}`;
  document.body.appendChild(banner);
  const app = document.createElement('main');
  app.className = 'wrap';
  app.id = 'app';
  app.innerHTML = '<div class="loading">Dashboard laden…</div>';
  document.body.appendChild(app);
  // en dan: exact dezelfde app-code als thuis (eindigt in loadAndRender())
  const script = document.createElement('script');
  script.textContent = DATA.appjs || '';
  document.body.appendChild(script);
}

async function ontgrendel(sleutel, onthoud) {
  const data = await ontsleutel(sleutel);      // gooit bij fout wachtwoord (GCM-check)
  if (onthoud) {
    const raw = await crypto.subtle.exportKey('jwk', sleutel);
    try { localStorage.setItem('kijksleutel', JSON.stringify(raw)); } catch (_) {}
  }
  startApp(data);
}

document.getElementById('open').addEventListener('click', async () => {
  const fout = document.getElementById('fout');
  const knop = document.getElementById('open');
  fout.textContent = '';
  knop.disabled = true; knop.textContent = 'Ontsleutelen…';
  try {
    const sleutel = await sleutelVanWachtwoord(document.getElementById('ww').value || '');
    await ontgrendel(sleutel, document.getElementById('onthoud').checked);
  } catch (_) {
    fout.textContent = 'Wachtwoord klopt niet (of het bestand is beschadigd).';
    knop.disabled = false; knop.textContent = 'Ontgrendelen';
  }
});
document.getElementById('ww').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('open').click();
});
// eerder onthouden sleutel? probeer stil te ontgrendelen (mislukt = gewoon inloggen)
(async () => {
  try {
    const bewaard = localStorage.getItem('kijksleutel');
    if (!bewaard) return;
    const sleutel = await crypto.subtle.importKey('jwk', JSON.parse(bewaard),
      { name: 'AES-GCM' }, true, ['decrypt']);
    await ontgrendel(sleutel, false);
  } catch (_) { try { localStorage.removeItem('kijksleutel'); } catch (_) {} }
})();
